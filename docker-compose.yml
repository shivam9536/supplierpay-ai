services:
  # ── Postgres Database ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: supplierpay-db
    environment:
      POSTGRES_USER: supplierpay
      POSTGRES_PASSWORD: supplierpay_dev
      POSTGRES_DB: supplierpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/db/seed/001_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplierpay"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supplierpay-net

  # ── Go Backend ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: supplierpay-backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - go_modules:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - supplierpay-net

  # ── React Frontend ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplierpay-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - supplierpay-net

volumes:
  postgres_data:
  go_modules:

networks:
  supplierpay-net:
    driver: bridge
